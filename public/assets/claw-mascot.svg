<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Lightning bolt -->
  <path d="M110 20 L85 95 L105 95 L75 180 L130 80 L108 80 L130 20 Z" fill="url(#clawGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Claw fingers -->
  <path d="M45 120 Q30 100 35 75 Q40 55 55 50" stroke="url(#clawGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M55 130 Q35 115 38 90 Q42 70 58 62" stroke="url(#clawGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M68 135 Q48 125 50 100 Q52 82 65 75" stroke="url(#clawGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Circuit nodes -->
  <circle cx="35" cy="75" r="4" fill="#A78BFA" opacity="0.8"/>
  <circle cx="50" cy="90" r="3" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="65" cy="100" r="3" fill="#7C3AED" opacity="0.6"/>
</svg>
